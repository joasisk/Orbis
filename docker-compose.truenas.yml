services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "8080:80"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /etc/caddy/Caddyfile <<'EOF'
        :80 {
          @api path /api/*

          reverse_proxy @api api:8000
          reverse_proxy web:3000
        }
        EOF
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - /mnt/YOUR_POOL/apps/orbis/caddy/data:/data
      - /mnt/YOUR_POOL/apps/orbis/caddy/config:/config
    depends_on:
      - web
      - api

  web:
    image: ghcr.io/joasisk/orbis-web:latest
    restart: unless-stopped
    depends_on:
      - api

  api:
    image: ghcr.io/joasisk/orbis-api:latest
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_NAME: orbis
      API_SECRET_KEY: CHANGE_THIS_TO_LONG_RANDOM_VALUE
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: CHANGE_THIS_DB_PASSWORD
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://TRUENAS_IP:8080
    depends_on:
      - postgres
      - redis

  worker:
    image: ghcr.io/joasisk/orbis-api:latest
    restart: unless-stopped
    command: python -m app.workers.main
    environment:
      APP_ENV: production
      APP_NAME: orbis
      API_SECRET_KEY: CHANGE_THIS_TO_LONG_RANDOM_VALUE
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: CHANGE_THIS_DB_PASSWORD
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: CHANGE_THIS_DB_PASSWORD
    volumes:
      - /mnt/YOUR_POOL/apps/orbis/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /mnt/YOUR_POOL/apps/orbis/redis:/data
