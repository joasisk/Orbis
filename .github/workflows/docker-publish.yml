name: Publish Docker images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: web
            context: ./apps/web
            image: ghcr.io/${{ github.repository_owner }}/orbis-web
            build_args: |
              NEXT_PUBLIC_API_BASE_URL=/api/v1
          - name: api
            context: ./apps/api
            image: ghcr.io/${{ github.repository_owner }}/orbis-api
            build_args: ""

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          build-args: ${{ matrix.build_args }}
