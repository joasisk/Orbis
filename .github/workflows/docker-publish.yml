name: Publish Docker images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: web
            context: ./apps/web
            image: ghcr.io/${{ github.repository_owner }}/orbis-web
            build_args: |
              NEXT_PUBLIC_API_BASE_URL=/api/v1
          - name: api
            context: ./apps/api
            image: ghcr.io/${{ github.repository_owner }}/orbis-api
            build_args: ""

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          build-args: ${{ matrix.build_args }}

  truenas-manifest:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v5

      - name: Render TrueNAS deployment compose (sha pinned)
        run: |
          set -euo pipefail
          WEB_IMAGE="ghcr.io/${{ github.repository_owner }}/orbis-web:${{ github.sha }}"
          API_IMAGE="ghcr.io/${{ github.repository_owner }}/orbis-api:${{ github.sha }}"
          sed \
            -e "s|ghcr.io/joasisk/orbis-web:latest|${WEB_IMAGE}|g" \
            -e "s|ghcr.io/joasisk/orbis-api:latest|${API_IMAGE}|g" \
            docker-compose.truenas.yml > docker-compose.truenas.sha.yml

          cat > truenas-images.txt <<EOF
          WEB_IMAGE=${WEB_IMAGE}
          API_IMAGE=${API_IMAGE}
          WORKER_IMAGE=${API_IMAGE}
          EOF

      - name: Upload TrueNAS deploy manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: truenas-deploy-${{ github.sha }}
          path: |
            docker-compose.truenas.sha.yml
            truenas-images.txt
