services:
  web:
    image: ghcr.io/joasisk/orbis-web:b7ba176b7dacc6274e283049a8129de7ef5b3367
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://TRUENAS_IP:8000/api/v1
    depends_on:
      - api

  api:
    image: ghcr.io/joasisk/orbis-api:b7ba176b7dacc6274e283049a8129de7ef5b3367
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_NAME: orbis
      API_SECRET_KEY: CHANGE_THIS_TO_LONG_RANDOM_VALUE
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: CHANGE_THIS_DB_PASSWORD
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://TRUENAS_IP:3000
    depends_on:
      - db
      - redis

  worker:
    image: ghcr.io/joasisk/orbis-api:b7ba176b7dacc6274e283049a8129de7ef5b3367
    restart: unless-stopped
    command: python -m app.workers.main
    environment:
      APP_ENV: production
      APP_NAME: orbis
      API_SECRET_KEY: CHANGE_THIS_TO_LONG_RANDOM_VALUE
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: CHANGE_THIS_DB_PASSWORD
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: CHANGE_THIS_DB_PASSWORD
    volumes:
      - /mnt/YOUR_POOL/apps/orbis/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /mnt/YOUR_POOL/apps/orbis/redis:/data
