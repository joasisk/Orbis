services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /mnt/YOUR_POOL/apps/orbis/caddy/data:/data
      - /mnt/YOUR_POOL/apps/orbis/caddy/config:/config
    depends_on:
      - web
      - api

  web:
    image: ghcr.io/joasisk/orbis-web:1e24fe6575361df9574176cc5df6953caf7c4191
    restart: unless-stopped
    depends_on:
      - api

  api:
    image: ghcr.io/joasisk/orbis-api:1e24fe6575361df9574176cc5df6953caf7c4191
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_NAME: orbis
      API_SECRET_KEY: CHANGE_THIS_TO_LONG_RANDOM_VALUE
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: CHANGE_THIS_DB_PASSWORD
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://TRUENAS_IP:8080
    depends_on:
      - postgres
      - redis

  worker:
    image: ghcr.io/joasisk/orbis-api:1e24fe6575361df9574176cc5df6953caf7c4191
    restart: unless-stopped
    command: python -m app.workers.main
    environment:
      APP_ENV: production
      APP_NAME: orbis
      API_SECRET_KEY: CHANGE_THIS_TO_LONG_RANDOM_VALUE
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: CHANGE_THIS_DB_PASSWORD
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: CHANGE_THIS_DB_PASSWORD
    volumes:
      - /mnt/YOUR_POOL/apps/orbis/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /mnt/YOUR_POOL/apps/orbis/redis:/data
